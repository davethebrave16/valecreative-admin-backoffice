<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ab8be"/>
      <stop offset="100%" stop-color="#6db870"/>
    </linearGradient>
  </defs>
  <!-- Gradient ring border -->
  <circle cx="16" cy="16" r="15" stroke="url(#ring)" stroke-width="2.5" fill="white"/>
  <!-- Brush tip (pointed bottom) -->
  <path d="M16 26 L14.2 20.5 L17.8 20.5 Z" fill="#2e6b55"/>
  <!-- Brush body -->
  <rect x="14.5" y="12" width="3" height="9" rx="1" fill="#2e6b55"/>
  <!-- Brush head circle -->
  <circle cx="16" cy="11" r="2.2" fill="#2e6b55"/>
  <!-- Arms (V-shape) -->
  <path d="M16 13.5 Q10 15 7.5 18" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M16 13.5 Q22 15 24.5 18" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <!-- Small golden tip accent -->
  <ellipse cx="16" cy="26.5" rx="1" ry="0.6" fill="#c8923a" opacity="0.9"/>
</svg>
